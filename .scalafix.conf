rules = [
  RemoveUnused,
  DisableSyntax,
  LeakingImplicitClassVal
]

RemoveUnused {
  imports = true
  privates = true
  locals = true
  patternvars = true
  params = false  # Can be noisy with overrides/interfaces
}

DisableSyntax {
  noVars = false
  noThrows = false
  noNulls = false   # Used intentionally as default parameters in builders
  noReturns = false  # Used for early returns in some places
  noAsInstanceOf = false
  noIsInstanceOf = false
  noFinalize = true
  noValPatterns = false
}

